# Workflow para quando a landing for um repositório próprio (este diretório como raiz).
# No monorepo DigitalSac quem executa é o .github/workflows/deploy_landing_dockerhub.yml da raiz.
name: Build e Push Docker Hub (imagem pública)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag da imagem (além de latest)"
        required: false
        default: ""
  push:
    branches:
      - main
    tags:
      - "v*" # ex.: v1.0.0 -> digitalsac/landing:1.0.0

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (arm64)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: digitalsac
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Resolver tags
        id: tags
        run: |
          TAGS="digitalsac/landing:latest"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            TAGS="$TAGS,digitalsac/landing:${VERSION}"
          elif [[ -n "${{ github.event.inputs.tag }}" ]]; then
            TAGS="$TAGS,digitalsac/landing:${{ github.event.inputs.tag }}"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build e push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=registry,ref=digitalsac/landing:buildcache
          cache-to: type=registry,ref=digitalsac/landing:buildcache,mode=max
